version: "3.8"

services:
  workspace:
    container_name: openeo-argoworkflows-executor-devcontainer
    network_mode: "host"
    user: "1000:1000" 
    build:
      context: ../
      dockerfile: ".devcontainer/Dockerfile"
      target: devcontainer
    volumes:
      - ../:/openeo-argoworkflows-executor
      - /eodc/:/eodc/
    tty: true